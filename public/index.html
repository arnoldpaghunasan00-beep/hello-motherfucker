<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Store</title>

<style>
  body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
  }

  h1 {
    text-align: center;
    padding: 20px;
  }

  form {
    text-align: center;
    margin-bottom: 20px;
  }

  input, button {
    padding: 10px;
    margin: 5px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
  }

  .card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  img {
    width: 100%;
    height: 200px;
    object-fit: cover;
  }

  .price {
    font-size: 18px;
    font-weight: bold;
    margin: 10px 0;
  }

  button.delete {
    background: red;
    color: white;
    border: none;
    cursor: pointer;
  }
</style>
</head>

<body>

<h1>⌚ Simple Watch Store</h1>

<form action="/create" method="post" enctype="multipart/form-data">
  <input type="file" name="image" required>
  <input type="text" name="caption" placeholder="Price (e.g. ₱1500)" required>
  <button type="submit">Add Product</button>
</form>

<div class="grid" id="products"></div>

<script>
fetch('/posts')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('products');

    data.reverse().forEach(item => {
      container.innerHTML += `
        <div class="card">
          <img src="/uploads/${item.image}">
          <div class="price">${item.caption}</div>
          <button class="delete" onclick="deletePost(${item.id})">Delete</button>
        </div>
      `;
    });
  });

function deletePost(id) {
  fetch('/delete/' + id, { method: 'DELETE' })
    .then(() => location.reload());
}
</script>

</body>
</html>
